services:
  - type: web
    name: enterprise-crm
    runtime: php
    region: frankfurt
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && npm install --production=false && npm run build && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /up
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
    autoDeploy: true
