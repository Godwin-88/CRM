app = "enterprise-crm-dev"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_LEVEL = "error"
  LOG_STACK = "single"
  SESSION_DRIVER = "redis"
  CACHE_STORE = "redis"
  QUEUE_CONNECTION = "redis"
  MFA_ENABLED = "false"

[deploy]
  release_command = "php /var/www/html/artisan migrate --force"

[[services]]
  internal_port = 80
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"