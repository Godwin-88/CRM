name: Deploy to Remote Server

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REMOTE_DEPLOY_PATH: ${{ secrets.REMOTE_DEPLOY_PATH || '/CRM/' }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  docker-build:
    uses: ./.github/workflows/docker-image.yml

  deploy-remote:
    runs-on: ubuntu-latest
    needs: [ci, docker-build]
    steps:
      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST || secrets.STAGING_HOST }}
          username: ${{ secrets.REMOTE_USER || secrets.STAGING_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY || secrets.STAGING_SSH_KEY }}
          envs: REMOTE_DEPLOY_PATH
          script_stop: true
          script: |
            set -e

            export APP_ENV=production
            export APP_DEBUG=false
            export LOG_LEVEL=error
            export LOG_STACK=single
            export SESSION_DRIVER=redis
            export CACHE_STORE=redis
            export QUEUE_CONNECTION=redis
            export MFA_ENABLED=false

            cd "${REMOTE_DEPLOY_PATH}"
            git fetch origin
            git reset --hard origin/main
            git pull origin main
            composer install --no-dev --no-interaction --no-progress --prefer-dist
            npm ci
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            sudo systemctl reload nginx
